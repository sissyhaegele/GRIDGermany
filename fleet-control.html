<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Grid Fleet Control - 100 Sensors</title>
    <script src="https://cdn.jsdelivr.net/npm/mqtt@5.3.4/dist/mqtt.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 15px;
            color: #333;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        
        .card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        h1 {
            color: #667eea;
            font-size: 22px;
            margin-bottom: 8px;
            text-align: center;
        }
        
        .subtitle {
            text-align: center;
            color: #666;
            font-size: 13px;
            margin-bottom: 15px;
        }
        
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            gap: 10px;
        }
        
        .status-badge {
            display: inline-block;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: bold;
            text-transform: uppercase;
        }
        
        .status-connected { background: #10b981; color: white; }
        .status-disconnected { background: #ef4444; color: white; }
        
        .quick-count {
            font-size: 11px;
            color: #666;
            font-weight: bold;
        }
        
        .btn {
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            text-transform: uppercase;
        }
        
        .btn:active { transform: scale(0.95); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .btn-connect {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            width: 100%;
        }
        
        .btn-start { background: linear-gradient(135deg, #10b981, #059669); color: white; }
        .btn-stop { background: linear-gradient(135deg, #ef4444, #dc2626); color: white; }
        .btn-pause { background: linear-gradient(135deg, #f59e0b, #d97706); color: white; }
        
        /* Quick Launch Buttons */
        .quick-launch {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 6px;
            margin-bottom: 15px;
        }
        
        .quick-btn {
            padding: 10px 4px;
            border: 2px solid #e5e7eb;
            border-radius: 10px;
            background: white;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
        }
        
        .quick-btn:hover {
            border-color: #667eea;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.2);
        }
        
        .quick-btn.active {
            border-color: #10b981;
            background: #d1fae5;
        }
        
        .quick-number {
            font-size: 20px;
            font-weight: bold;
            color: #667eea;
        }
        
        .quick-label {
            font-size: 8px;
            color: #666;
            margin-top: 2px;
        }
        
        /* Sensor List */
        .sensor-list {
            max-height: 350px;
            overflow-y: auto;
        }
        
        .sensor-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            margin-bottom: 6px;
            background: #f9fafb;
            border-radius: 10px;
            border-left: 4px solid #e5e7eb;
        }
        
        .sensor-item.running {
            border-left-color: #10b981;
            background: #d1fae5;
        }
        
        .sensor-item.selected {
            border-left-color: #667eea;
            background: #ede9fe;
        }
        
        .sensor-info {
            flex: 1;
        }
        
        .sensor-name {
            font-size: 12px;
            font-weight: bold;
            color: #1f2937;
        }
        
        .sensor-district {
            font-size: 9px;
            color: #6b7280;
            text-transform: uppercase;
        }
        
        .sensor-status {
            font-size: 10px;
            padding: 3px 8px;
            border-radius: 12px;
            font-weight: bold;
        }
        
        .status-running { background: #d1fae5; color: #065f46; }
        .status-stopped { background: #f3f4f6; color: #6b7280; }
        
        .sensor-controls {
            display: flex;
            gap: 4px;
        }
        
        .sensor-btn {
            padding: 5px 10px;
            border: none;
            border-radius: 8px;
            font-size: 10px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
        }
        
        /* Bulk Controls */
        .bulk-controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        
        .log {
            max-height: 120px;
            overflow-y: auto;
            font-size: 11px;
            line-height: 1.5;
            background: #f9fafb;
            padding: 12px;
            border-radius: 10px;
            margin-top: 15px;
        }
        
        .log-entry {
            padding: 3px 0;
            border-bottom: 1px solid #e5e7eb;
        }
        
        .log-time {
            color: #9ca3af;
            font-size: 10px;
        }
        
        /* District filter */
        .district-filter {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            margin-bottom: 10px;
        }
        
        .district-btn {
            padding: 4px 10px;
            border: 1px solid #ddd;
            border-radius: 12px;
            font-size: 10px;
            cursor: pointer;
            background: white;
        }
        
        .district-btn.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }
    </style>
</head>

        function initSensors() {

            const districts = [...new Set(SENSORS.map(s => s.district))];
            const filterEl = document.getElementById('districtFilter');
            filterEl.innerHTML = '<button class="district-btn active" onclick="filterDistrict(\'all\')">All (100)</button>';

                btn.textContent = `${district} (${count})`;
                btn.id = `filter-${district}`;
                filterEl.appendChild(btn);
            });
            
            // Build sensor list
            renderSensorList();
        }
        
        function renderSensorList() {

            list.innerHTML = '';
            
            const filteredSensors = currentDistrictFilter === 'all'

            filteredSensors.forEach(sensor => {
                const item = document.createElement('div');
                item.className = 'sensor-item' + (sensor.selected ? ' selected' : '');
                item.id = `sensor-${sensor.id}`;
                
                item.innerHTML = `
                    <div class="sensor-info">
                        <div class="sensor-name">${sensor.id}</div>
                        <div class="sensor-district">${sensor.district}</div>
                    </div>

                    </div>
                `;
                
                list.appendChild(item);
                sensorStatus[sensor.id] = 'stopped';
            });
            
            updateActiveCount();
        }
        
        function filterDistrict(district) {
            currentDistrictFilter = district;
            
            // Update button states
            document.querySelectorAll('.district-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            if (district === 'all') {
                document.querySelector('.district-btn').classList.add('active');
            } else {
                document.getElementById(`filter-${district}`)?.classList.add('active');
            }
            
            renderSensorList();
            
            // Re-enable buttons if connected
            if (connected) {
                enableControls();
            }
        }
        
        function quickLaunch(count) {
            // Reset all selections
            SENSORS.forEach(s => s.selected = false);
            
            // Select first N sensors
            for (let i = 0; i < Math.min(count, SENSORS.length); i++) {
                SENSORS[i].selected = true;
            }
            
            updateQuickButtons();
            renderSensorList();
            addLog(`⚡ Selected ${count} sensor(s)`);
        }
        
        function updateQuickButtons() {
            const selectedCount = SENSORS.filter(s => s.selected).length;
            
            [1, 3, 7, 10, 25, 50, 100].forEach(count => {
                const btn = document.getElementById(`quick-${count}`);
                if (btn) {
                    btn.className = 'quick-btn' + (selectedCount === count ? ' active' : '');
                }
            });
        }
        
        function updateActiveCount() {
            const active = Object.values(sensorStatus).filter(s => s === 'running').length;
            document.getElementById('activeCount').textContent = active;
        }
        
        function addLog(message) {
            const log = document.getElementById('log');
            const time = new Date().toLocaleTimeString('de-DE');
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.innerHTML = `<span class="log-time">${time}</span> <span>${message}</span>`;
            log.insertBefore(entry, log.firstChild);
            
            while (log.children.length > 30) {
                log.removeChild(log.lastChild);
            }
        }
        
        function toggleConnection() {
            if (connected) {
                disconnect();
            } else {
                connect();

        }

            const url = `wss://${CONFIG.broker}:${CONFIG.port}`;
            client = mqtt.connect(url, {
                clientId: `fleet-control-${Date.now()}`,
                username: CONFIG.username,
                password: CONFIG.password,
                clean: true,
                reconnectPeriod: 5000,
                protocolVersion: 4
            });
            
            client.on('connect', () => {
                connected = true;
                addLog('✅ Connected!');
                
                document.getElementById('connectionStatus').textContent = 'Connected';
                document.getElementById('connectionStatus').className = 'status-badge status-connected';
                document.getElementById('connectBtn').textContent = 'Disconnect';
                
                enableControls();
                
                // Subscribe to all sensor status using MQTT wildcard (+)
                client.subscribe('control/sensor/+/status', { qos: 1 });
                
                addLog('📡 Subscribed to control/sensor/+/status');
            });
            
            client.on('message', (topic, message) => {
                try {
                    const data = JSON.parse(message.toString());
                    const sensorId = topic.split('/')[2];
                    
                    if (data.status && sensorStatus[sensorId] !== undefined) {
                        sensorStatus[sensorId] = data.status;
                        
                        const statusEl = document.getElementById(`status-${sensorId}`);
                        const itemEl = document.getElementById(`sensor-${sensorId}`);
                        
                        if (statusEl && itemEl) {
                            if (data.status === 'running' || data.status === 'started') {
                                statusEl.textContent = '● Running';
                                statusEl.className = 'sensor-status status-running';
                                itemEl.classList.add('running');
                            } else {
                                statusEl.textContent = '○ Stopped';
                                statusEl.className = 'sensor-status status-stopped';
                                itemEl.classList.remove('running');
                            }
                        }
                        
                        updateActiveCount();
                    }
                } catch (e) {
                    console.error('Parse error:', e);
                }
            });
            
            client.on('error', (err) => {
                addLog(`❌ Error: ${err.message}`);
            });
            
            client.on('close', () => {
                connected = false;
                document.getElementById('connectionStatus').textContent = 'Disconnected';
                document.getElementById('connectionStatus').className = 'status-badge status-disconnected';
                document.getElementById('connectBtn').textContent = 'Connect to Broker';
                addLog('🔌 Disconnected');
            });
        }
        
        function enableControls() {
            document.getElementById('startAllBtn').disabled = false;
            document.getElementById('stopAllBtn').disabled = false;
            
            SENSORS.forEach(sensor => {
                const startBtn = document.getElementById(`start-${sensor.id}`);
                const stopBtn = document.getElementById(`stop-${sensor.id}`);
                if (startBtn) startBtn.disabled = false;
                if (stopBtn) stopBtn.disabled = false;
            });
        }
        
        function disconnect() {
            if (client) {
                client.end();
                client = null;
            }
        }
        
        function startSensor(sensorId) {
            sendCommand(sensorId, 'start');
        }
        
        function stopSensor(sensorId) {
            sendCommand(sensorId, 'stop');
        }
        
        function startAll() {
            const selected = SENSORS.filter(s => s.selected);
            
            if (selected.length === 0) {
                addLog('⚠️ No sensors selected!');
                return;
            }
            
            addLog(`🚀 Starting ${selected.length} sensors...`);
            selected.forEach((sensor, index) => {
                // Stagger commands to avoid overwhelming
                setTimeout(() => {
                    sendCommand(sensor.id, 'start');
                }, index * 50);
            });
        }
        
        function stopAll() {
            const selected = SENSORS.filter(s => s.selected);
            console.log('stopAll called, selected:', selected.length);
            addLog(`🛑 Stopping ${selected.length > 0 ? selected.length + ' selected' : 'all'} sensors...`);
            
            const toStop = selected.length > 0 ? selected : SENSORS;
            console.log('toStop count:', toStop.length);
            
            toStop.forEach((sensor, index) => {
                setTimeout(() => {
                    console.log('Sending stop to:', sensor.id);
                    sendCommand(sensor.id, 'stop');
                }, index * 20);
            });
        }
        
        function sendCommand(sensorId, command) {
            if (!connected || !client) {
                addLog('❌ Not connected!');
                return;
            }
            
            const payload = {
                command: command,
                requestId: `req-${Date.now()}`
            };
            
            // Control topic for MQTT
            const topic = `control/sensor/${sensorId}/command`;
            
            client.publish(topic, JSON.stringify(payload), { qos: 1 });
        }
        
        // Initialize on load
        window.addEventListener('load', () => {
            initSensors();
            addLog('🚀 Fleet Control ready (100 sensors)');
            addLog('📋 Protocol: MQTT over WebSocket');
            addLog('📋 Control Topic: control/sensor/+/command');
        });
    </script>
</body>
</html>
