---
applications:
- name: berliner-stadtwerke-api
  memory: 256M
  disk_quota: 512M
  instances: 1
  buildpacks:
    - nodejs_buildpack
  command: npm start
  env:
    # Solace Cloud Connection
    SOLACE_HOST: your-broker.messaging.solace.cloud
    SOLACE_PORT: "1883"
    SOLACE_USERNAME: your-solace-username
    SOLACE_PASSWORD: your-solace-password
    
    # Optional: Webhook URLs für SAP Build Process Automation
    # WEBHOOK_OUTAGE_URL: https://your-spa-webhook-url
    # WEBHOOK_ANOMALY_URL: https://your-spa-webhook-url
    
    # Node.js Settings
    NODE_ENV: production
  
  # Health Check
  health-check-type: http
  health-check-http-endpoint: /health
  
  # Route (wird automatisch generiert, kann aber überschrieben werden)
  routes:
    - route: berliner-stadtwerke-api.cfapps.eu10.hana.ondemand.com
  
  # Services (optional - für HANA, Redis, etc.)
  # services:
  #   - hana-db
  #   - redis-cache
