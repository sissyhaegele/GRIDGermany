apiVersion: gateway.kyma-project.io/v2
kind: APIRule
metadata:
  name: litellm-proxy
  labels:
    app.kubernetes.io/name: litellm-proxy
  namespace: solace-agent-mesh
spec:
  gateway: kyma-system/kyma-gateway
  hosts:
    - litellm-proxy
  rules:
    - methods:
        - GET
        - POST
        - PUT
        - DELETE
        - PATCH
      noAuth: true
      path: /*
      request:
        cookies:
          kyma-foo: bar
  service:
    name: litellm-proxy
    port: 80